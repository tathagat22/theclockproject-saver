<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }

    .clock-img {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    .clock-img.active { opacity: 1; }

    #time-label {
      position: fixed;
      bottom: 1.2rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: "SF Mono", "Menlo", monospace;
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      color: rgba(255,255,255,0.15);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <img id="img-a" class="clock-img active" />
  <img id="img-b" class="clock-img" />
  <div id="time-label"></div>
  <script src="screensaver.js"></script>
</body>
</html>
